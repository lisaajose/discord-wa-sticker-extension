<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Sticker Converter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo-area">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="url(#grad1)"/>
          <path d="M7 10C7 10 9.5 8 14 8C18.5 8 21 10 21 10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="10.5" cy="14" r="1.5" fill="white"/>
          <circle cx="17.5" cy="14" r="1.5" fill="white"/>
          <path d="M10 18C10 18 11.5 20 14 20C16.5 20 18 18 18 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="grad1" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#5865F2"/>
              <stop offset="100%" stop-color="#25D366"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="popup-title">Discord Sticker<br>Converter</h1>
      </div>
      <p class="popup-subtitle">Convert stickers & emojis to WhatsApp format</p>
    </header>

    <!-- Action Buttons -->
    <div class="actions">
      <button id="btn-convert-last" class="btn btn-primary">
        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Convert Last Sticker
      </button>

      <button id="btn-export-pack" class="btn btn-secondary">
        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="7.5 4.21 12 6.81 16.5 4.21"/>
          <polyline points="7.5 19.79 7.5 14.6 3 12"/>
          <polyline points="21 12 16.5 14.6 16.5 19.79"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        Download Entire Sticker Pack
      </button>
    </div>

    <!-- Progress Section -->
    <div id="progress-section" class="progress-section hidden">
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="progress-text" class="progress-text">Processing...</p>
    </div>

    <!-- Status Messages -->
    <div id="status-area" class="status-area">
      <p id="status-text" class="status-text">Hover over a Discord sticker or emoji to convert it</p>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="footer-text">v1.1.0 • Stickers & Emojis • PNG, APNG, GIF & Lottie</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
